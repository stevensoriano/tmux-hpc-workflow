# tmux.conf — a tmux workflow for an HPC cluster (built/tested on tmux 3.5a; needs 3.4+)
# See README.md for the design rationale and feature overview.

# ============================================================
# Core settings
# ============================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,gnome*:RGB,screen-256color:RGB"
set -g escape-time 0
set -g focus-events on
set -g history-limit 1000000
set -g mouse on
# Clipboard via OSC 52 — required for TUI copy bindings that emit OSC 52
# (helix, neovim with clipboard=osc52, and similar full-screen CLI apps).
# - set-clipboard on    : tmux propagates inner-app OSC52 to the outer terminal
#                         AND writes to its own paste buffer.
# - allow-passthrough on: lets DCS/OSC sequences from nested apps flow upward
#                         (also enables sixel/iTerm2 image proto if ever used).
# - terminal-features ...,clipboard : declares to tmux that the outer terminal
#                         (FastX/gnome-terminal) accepts OSC52 — needed because
#                         tmux-256color terminfo doesn't ship the Ms capability.
# Note: the outer terminal must also allow clipboard access (e.g. FastX's
# "Applications in terminal may access clipboard" client-side toggle).
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ",*:clipboard"
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g set-titles on
set -g set-titles-string "tmux:#S #W"
set -g status-position top
set -g status-interval 5
setw -g mode-keys vi

# Prefix is F12 — chosen because FastX/gnome was intercepting ALL Ctrl-based combinations
# in this user's setup (Shift+arrows worked, Ctrl+B and Ctrl+Space did NOT reach tmux).
# F12 is a single keystroke with no modifier required, so nothing upstream eats it.
unbind C-b
set -g prefix F12
bind F12 send-prefix

# ============================================================
# Keybindings
# ============================================================
# Splits — | vertical, - horizontal, both inheriting cwd
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Clear screen — Ctrl+L doesn't reach the shell in FastX/gnome here, so we
# synthesize it inside tmux and inject it into the pane.
#   F12 k : clear visible screen only (like a normal Ctrl+L)
#   F12 K : clear screen AND wipe tmux's scrollback for this pane
bind k send-keys C-l
bind K send-keys C-l \; clear-history \; display-message "Screen + scrollback cleared"

# Sessionizer popup (fzf jump to project)
bind f display-popup -E -w 60% -h 50% "~/bin/tmux-sessionizer"

# Agent launcher menu — entries configured in agents.conf (see README).
bind a run-shell "~/bin/tmux-agent-menu"

# tmux-fzf catch-all (sessions/windows/panes/kill/swap)
bind Q run-shell "~/.tmux/plugins/tmux-fzf/main.sh"

# Quick pane navigation without prefix (Alt+arrows)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Window cycling without prefix (Shift+arrows)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Session cycling without prefix (Shift+Up/Down) — vertical mirror of the window keys:
# Left/Right move between windows of THIS session; Up/Down move between sessions
# (matches the two-row status bar — windows on row 2, session tabs on row 1).
bind -n S-Up   switch-client -p
bind -n S-Down switch-client -n

# Copy-mode (vi-style)
bind -T copy-mode-vi v send-keys -X begin-selection
# y pipes the selection through xsel → the X11 CLIPBOARD (needs `xsel` on PATH; optional).
bind -T copy-mode-vi y       send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
# Mouse-drag release: same — selection goes to system clipboard automatically.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
# Belt-and-suspenders exits from copy-mode (defaults usually cover this).
bind -T copy-mode-vi q      send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Panic key: Prefix + Escape force-exits any pane mode (copy/view/etc.).
bind Escape if-shell -F "#{pane_in_mode}" "send-keys -X cancel" "display-message 'no mode active'"

# Mouse wheel routing:
#   - Mouse-aware apps (vim, less, htop, watch — anything that sets the terminal
#     mouse-tracking escape) get the wheel events forwarded so they can scroll
#     their own buffers natively.
#   - Everything else (plain shells and TUIs that do NOT enable mouse capture)
#     enters tmux copy-mode on wheel-up so the scrollback is browsable. This is
#     tmux's default behavior — the COPY-MODE tag in the status bar makes it
#     obvious, and `q` / Escape exit. (A "drop wheel events" hack breaks such
#     TUIs' scrolling, since they don't set mouse_any_flag.)
bind -T root WheelUpPane   if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" "send-keys -M" "copy-mode -e; send-keys -M"
bind -T root WheelDownPane if-shell -F -t = "#{?pane_in_mode,1,#{mouse_any_flag}}" "send-keys -M" ""

# ============================================================
# Hooks — auto-name windows by running command
# ============================================================
# Stable window names — created with -n shell/agent/queue/logs and they stay that way.
# automatic-rename off : tmux won't rename based on running command.
# allow-rename off     : apps (vim, etc.) can't override via terminal escapes either.
setw -g automatic-rename off
set  -g allow-rename     off

# ============================================================
# Status line — hand-rolled (catppuccin removed; the new modular version
# requires building status-left/right from its own module formats, which
# is more complexity than this workflow needs).
# Catppuccin Mocha palette: bg #1e1e2e, fg #cdd6f4, accents #89b4fa, #a6e3a1, #f9e2af, #cba6f7
# ============================================================
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 60
set -g status-right-length 120
# Session name on the left; if the active pane is in copy-mode, a red COPY-MODE tag appears.
set -g status-left  "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]  #{?pane_in_mode,#[fg=#1e1e2e#,bg=#f38ba8#,bold] COPY-MODE #[default]  ,}"
set -g window-status-format         "#[fg=#a6adc8] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[default]"
set -g window-status-separator ""
# Make copy-mode selections highly visible.
set -g mode-style "fg=#1e1e2e,bg=#f9e2af,bold"

# HPC modules — used in status-right below. Cached scripts (10s TTL).
set -g @hpc_slurm "#(~/bin/slurm-status)"
set -g @hpc_gpu   "#(~/bin/gpu-status)"

set -g status-right "#[fg=#a6e3a1]#{@hpc_slurm}#[default]  #[fg=#f9e2af]#{@hpc_gpu}#[default]  #[fg=#89b4fa]#H#[default]  %H:%M"

# ============================================================
# Two-line status — persistent SESSION TAB STRIP on the top row,
# the normal window/HPC bar on the row directly below it.
#   status-format[0] : session tabs — every session as a tab; the one this
#                      client is attached to (#{client_session}) is highlighted;
#                      each tab is a click-to-switch range (user|S:<name>).
#   status-format[1] : the normal bar — rebuilt from the SAME status-left /
#                      window-status-* / status-right options defined above, so
#                      the session chip, window tabs and HPC readouts are unchanged.
# With status-position top, format[0] is the top row and format[1] sits beneath it.
# Revert to one line:  set -g status on  (the two status-format lines then go unused).
# Window tabs (within the active session) stay on row 2: Shift-Left/Right, F12 1..4.
# ============================================================
set -g status 2
set -g status-format[0] "#[align=left]#{S:#[range=user|S:#{session_name}]#{?#{==:#{session_name},#{client_session}},#[fg=#1e1e2e#,bg=#89b4fa#,bold] #{session_name} #[default],#[fg=#a6adc8] #{session_name} #[default]}#[norange]#[fg=#313244]│#[default]}"
set -g status-format[1] "#[align=left range=left]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=left]#{W:#[range=window|#{window_index}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

# Click a session tab to switch this client to it; clicks elsewhere on the status
# line keep the normal select-window behaviour. The strip tags each tab's range as
# "S:<name>", so the #{m:S:*} test tells tab-clicks apart from window-row clicks
# regardless of which row tmux draws first. The actual switch goes through a helper
# (~/bin/tmux-switch-clicked) because switch-client -t does NOT expand #{...} in its
# target and tmux's #{s/^S://:...} substitution returns empty for this pattern.
unbind -n MouseDown1Status
bind -n MouseDown1Status if-shell -F "#{m:S:*,#{mouse_status_range}}" "run-shell '~/bin/tmux-switch-clicked #{mouse_status_range} #{client_name}'" "select-window -t="

# Pane borders
set -g pane-border-style       "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Messages (command bar / display-message)
set -g message-style          "fg=#1e1e2e,bg=#f9e2af,bold"
set -g message-command-style  "fg=#1e1e2e,bg=#a6e3a1,bold"

# ============================================================
# Resurrect — manual save/restore
#   C-b C-s : save now
#   C-b C-r : restore
# Continuum (auto-save every N min, auto-restore at startup) is intentionally
# NOT loaded — its startup script polls the server during initial config load
# and deadlocks on the first run. Manual save is reliable; if you reboot or
# kill the server, hit C-b C-r in your next tmux session to bring it back.
# ============================================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# ============================================================
# Plugins — loaded asynchronously to avoid the headless-load deadlock
# (plugin scripts that call `tmux show-option` block until a client
# is attached; `run-shell -b` queues them after the server is up).
#
# tmux-sensible is intentionally skipped — its defaults (escape-time 0,
# focus-events, history-limit, etc.) are already in this file.
# catppuccin is intentionally skipped — replaced by the hand-rolled
# status line above.
# tmux-fzf is invoked on demand by `bind Q` above; no init script needed.
# ============================================================
run-shell -b '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run-shell -b '~/.tmux/plugins/tmux-yank/yank.tmux'
run-shell -b '~/.tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux'
